- name: Asegurar que Java esté instalado
  apt:
    name: openjdk-25-jdk
    state: present
    update_cache: yes
- name: Crear usuario del servicio
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    state: present
- name: Crear directorio de la aplicación
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
- name: Copiar el archivo JAR de la aplicación
  copy:
    src: "{{ jar_file }}"
    dest: "{{ app_dir }}/{{ jar_file }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
- name: Copiar el servicio systemd
  template:
    src: springboot.service.j2
    dest: /etc/systemd/system/{{ service_name }}.service
  notify:
    - Reiniciar servicio Spring Boot
- name: Habilitar e iniciar el servicio
  systemd:
    name: "{{ service_name }}"
    enabled: yes
    state: started